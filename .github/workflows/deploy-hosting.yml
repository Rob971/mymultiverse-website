name: Deploy hosting

on:
  workflow_dispatch:
    inputs:
      android_sha256_fingerprint:
        description: "SHA-256 fingerprint (colon-free). Leave empty to use ANDROID_SHA256_FINGERPRINT secret."
        required: false
        type: string
      ios_team_id:
        description: "Optional Apple Team ID for iOS Universal Links"
        required: false
        type: string
      skip_verify:
        description: "Skip post-deploy curl verification"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "public/**"
      - "firebase.json"
      - ".firebaserc"
      - "scripts/**"
      - ".github/workflows/deploy-hosting.yml"

permissions:
  contents: read

env:
  FIREBASE_PROJECT_ID: mymultiverseapp
  FIREBASE_TOOLS_VERSION: "14.9.0"

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.23.1"

      - name: Resolve Android SHA-256 fingerprint
        id: fingerprint
        env:
          INPUT_FINGERPRINT: ${{ inputs.android_sha256_fingerprint }}
          SECRET_FINGERPRINT: ${{ secrets.ANDROID_SHA256_FINGERPRINT }}
        run: |
          FINGERPRINT="${INPUT_FINGERPRINT:-${SECRET_FINGERPRINT:-}}"
          if [[ -z "${FINGERPRINT}" ]]; then
            echo "Set workflow input android_sha256_fingerprint or repo secret ANDROID_SHA256_FINGERPRINT." >&2
            echo "From MyMultiverseApp: scripts/print-android-apk-fingerprint.sh <apk>" >&2
            exit 1
          fi
          echo "sha256=${FINGERPRINT}" >> "$GITHUB_OUTPUT"

      - name: Resolve auth strategy
        id: auth
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [[ -n "${FIREBASE_TOKEN}" ]]; then
            echo "strategy=token" >> "$GITHUB_OUTPUT"
          elif [[ -n "${FIREBASE_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "strategy=adc_json" >> "$GITHUB_OUTPUT"
          elif [[ -n "${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64}" ]]; then
            echo "strategy=adc_base64" >> "$GITHUB_OUTPUT"
          else
            echo "Set FIREBASE_SERVICE_ACCOUNT_JSON, FIREBASE_SERVICE_ACCOUNT_JSON_BASE64, or FIREBASE_TOKEN." >&2
            exit 1
          fi

      - name: Verify Firebase credentials
        if: steps.auth.outputs.strategy != 'token'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          pip install -q google-auth requests
          python3 scripts/firebase-credentials.py verify

      - name: Authenticate to Google Cloud
        if: steps.auth.outputs.strategy == 'adc_json'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          cleanup_credentials: false

      - name: Prepare service account file (base64 secret)
        if: steps.auth.outputs.strategy == 'adc_base64'
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          pip install -q google-auth requests
          creds_path="$(python3 scripts/firebase-credentials.py write)"
          chmod 600 "${creds_path}"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${creds_path}" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm install -g "firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}"

      - name: Smoke test Firebase CLI auth
        if: steps.auth.outputs.strategy != 'token'
        run: firebase projects:list --project "${{ env.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Deploy
        env:
          ANDROID_SHA256_FINGERPRINT: ${{ steps.fingerprint.outputs.sha256 }}
          IOS_TEAM_ID: ${{ inputs.ios_team_id }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          FIREBASE_TOOLS_VERSION: ${{ env.FIREBASE_TOOLS_VERSION }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          SKIP_VERIFY: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_verify) && '1' || '0' }}
        run: |
          chmod +x ./scripts/deploy.sh
          ./scripts/deploy.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "## Firebase Hosting"
            echo
            echo "- Site: https://mymultiverse.app"
            echo "- Verify: \`./scripts/verify-hosting.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"
