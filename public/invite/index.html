<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open Ammò</title>
</head>
<body style="margin:0;padding:32px 16px;background:#f6f1ea;font-family:Helvetica,Arial,sans-serif;color:#2c241c;text-align:center;">
  <div style="max-width:420px;margin:0 auto;background:#ffffff;border-radius:16px;padding:32px 24px;">
    <p style="margin:0 0 8px;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;color:#c45c26;">Ammò</p>
    <h1 style="margin:0 0 12px;font-size:24px;line-height:1.25;">Open your invitation</h1>
    <p style="margin:0 0 24px;font-size:16px;line-height:1.5;color:#5c5348;">
      Continue in the Ammò app to review and accept your household invite.
    </p>
    <p style="margin:0 0 16px;">
      <a id="open-app" href="#" style="display:inline-block;background:#1f6f78;color:#ffffff;text-decoration:none;font-size:16px;font-weight:600;padding:14px 28px;border-radius:999px;">
        Open Ammò
      </a>
    </p>
    <p id="invalid" style="display:none;margin:0;font-size:16px;line-height:1.5;color:#5c5348;">
      This invite link is missing or invalid. Ask the household owner to send a new invitation.
    </p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = (params.get("token") || "").trim();
      var openLink = document.getElementById("open-app");
      var invalid = document.getElementById("invalid");
      if (!token) {
        openLink.style.display = "none";
        invalid.style.display = "block";
        return;
      }
      var deepLink = "app.mymultiverse.kmp://invite?token=" + encodeURIComponent(token);
      var withoutScheme = deepLink.replace("app.mymultiverse.kmp://", "");
      var androidIntent = "intent://" + withoutScheme + "#Intent;scheme=app.mymultiverse.kmp;package=app.mymultiverse.kmp;end";
      openLink.href = deepLink;
      try { window.location.replace(deepLink); } catch (_) {}
      var androidHint = document.createElement("p");
      androidHint.style.margin = "16px 0 0";
      androidHint.style.fontSize = "14px";
      androidHint.style.lineHeight = "1.5";
      androidHint.style.color = "#8a8178";
      androidHint.innerHTML = 'On Android, <a href="' + androidIntent + '" style="color:#1f6f78;">tap here if the app did not open</a>.';
      openLink.parentNode.appendChild(androidHint);
    })();
  </script>
</body>
</html>
